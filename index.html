<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental-Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #3b6ff0;
      --primary-dark: #2a56d0;
      --danger: #e84040;
      --warning: #f59e0b;
      --success: #22c55e;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--primary); }

    #btn-add {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s;
    }

    #btn-add:hover { background: var(--primary-dark); }

    /* ── Main ── */
    main {
      max-width: 1020px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .stat-card .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.75rem; font-weight: 700; margin-top: 4px; }
    .stat-card.warn   .value { color: var(--warning); }
    .stat-card.blue   .value { color: var(--primary); }
    .stat-card.danger .value { color: var(--danger); }
    .stat-card.green  .value { color: var(--success); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.12s;
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-wrap input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px 7px 32px;
      font-size: 0.85rem;
      outline: none;
      background: var(--card);
      width: 210px;
    }

    .search-wrap::before {
      content: "🔍";
      font-size: 0.75rem;
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Orders list ── */
    #orders-list { display: flex; flex-direction: column; gap: 12px; }

    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 15px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    .order-card::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 12px 0 0 12px;
      background: var(--primary);
    }

    .order-card.due-soon::before { background: var(--warning); }
    .order-card.overdue::before  { background: var(--danger); }
    .order-card.returned::before { background: var(--success); }
    .order-card.returned { opacity: 0.6; }

    /* main row inside card */
    .card-main-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .type-badge {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .type-badge.wc   { background: #eff6ff; }
    .type-badge.tent { background: #fdf4ff; }

    .order-info { flex: 1; min-width: 0; }

    .order-info .client {
      font-weight: 700;
      font-size: 0.97rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-info .sub {
      font-size: 0.81rem;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .order-meta {
      text-align: right;
      flex-shrink: 0;
    }

    .order-meta .date { font-size: 0.85rem; font-weight: 600; }

    .order-meta .days-tag {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.73rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .days-tag.ok       { background: #f0fdf4; color: var(--success); }
    .days-tag.soon     { background: #fffbeb; color: var(--warning); }
    .days-tag.overdue  { background: #fef2f2; color: var(--danger); }
    .days-tag.returned { background: #f1f5f9; color: var(--muted); }

    .order-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 7px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }

    .action-btn:hover        { background: var(--bg); }
    .action-btn.delete:hover { background: #fef2f2; border-color: #fca5a5; }

    /* WC detail chips row */
    .card-wc-details {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding-left: 58px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.76rem;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
      white-space: nowrap;
    }

    .chip.clean-ok      { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
    .chip.clean-soon    { background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .chip.clean-overdue { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
    .chip.debt          { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    .chip.long-term     { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .chip.bank          { background: #f5f3ff; border-color: #ddd6fe; color: #5b21b6; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; }

    /* ── Alert banners ── */
    .banner {
      display: none;
      border-radius: var(--radius);
      padding: 13px 16px;
      margin-bottom: 10px;
      font-size: 0.875rem;
    }

    .banner.show  { display: block; }
    .banner.due   { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .banner.clean { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px;
      overflow-y: auto;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: pop 0.18s ease;
      margin: auto;
    }

    @keyframes pop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      color: var(--text);
      background: var(--card);
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,111,240,0.1);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }

    .field-row .field { margin-bottom: 0; }

    /* type selector cards */
    .type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type-option {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      user-select: none;
    }

    .type-option input { display: none; }
    .type-option .icon { font-size: 1.8rem; }
    .type-option .name { font-size: 0.85rem; font-weight: 600; margin-top: 6px; color: var(--text); }

    .type-option:has(input:checked) {
      border-color: var(--primary);
      background: #eff6ff;
    }

    /* WC-specific section in modal */
    #wc-section {
      border-top: 1px solid var(--border);
      margin-top: 4px;
      padding-top: 16px;
    }

    #wc-section.hidden { display: none; }

    /* Day-of-week picker */
    .day-picker {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .day-picker input { display: none; }

    .day-label {
      display: inline-block;
      padding: 6px 11px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      background: var(--card);
      transition: all 0.12s;
      user-select: none;
    }

    .day-picker input:checked + .day-label {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-cancel {
      flex: 1;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
    }

    .btn-save {
      flex: 2;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-save:hover { background: var(--primary-dark); }

    @media (max-width: 540px) {
      header { padding: 14px 16px; }
      main { padding: 20px 12px; }
      .order-meta { display: none; }
      .card-wc-details { padding-left: 0; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1><span>Rental</span>-Manager</h1>
  <button id="btn-add">+ Shto Porosi</button>
</header>

<!-- ── Main ── -->
<main>

  <!-- Banners -->
  <div id="banner-due"   class="banner due"></div>
  <div id="banner-clean" class="banner clean"></div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card blue">
      <div class="label">Porosi Aktive</div>
      <div class="value" id="stat-active">0</div>
    </div>
    <div class="stat-card warn">
      <div class="label">Kthehen Nesër</div>
      <div class="value" id="stat-due">0</div>
    </div>
    <div class="stat-card">
      <div class="label">WC Jashtë</div>
      <div class="value" id="stat-wc">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Tenda Jashtë</div>
      <div class="value" id="stat-tent">0</div>
    </div>
    <div class="stat-card danger">
      <div class="label">Pastrim Sot</div>
      <div class="value" id="stat-clean">0</div>
    </div>
    <div class="stat-card warn">
      <div class="label">Borxhi Total</div>
      <div class="value" id="stat-debt">0€</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Të gjitha</button>
    <button class="filter-btn" data-filter="active">Aktive</button>
    <button class="filter-btn" data-filter="due-soon">Afër Afatit</button>
    <button class="filter-btn" data-filter="overdue">Vonuara</button>
    <button class="filter-btn" data-filter="returned">Kthyera</button>
    <button class="filter-btn" data-filter="cleaning">🧹 Pastrim Sot</button>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Kërko klient, adresë, telefon…" />
    </div>
  </div>

  <!-- Orders -->
  <div id="orders-list"></div>

</main>

<!-- ── Add / Edit Modal ── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Porosi e Re</h2>

    <!-- Common fields -->
    <div class="field">
      <label>Emri dhe Mbiemri</label>
      <input id="f-client" type="text" placeholder="p.sh. Agim Berisha" />
    </div>

    <div class="field">
      <label>Lokacioni</label>
      <input id="f-address" type="text" placeholder="p.sh. Rruga Dëshmorët, Prishtinë" />
    </div>

    <div class="field">
      <label>Numri i Telefonit</label>
      <input id="f-phone" type="tel" placeholder="p.sh. +383 44 123 456" />
    </div>

    <div class="field">
      <label>Lloji i Shërbimit</label>
      <div class="type-selector">
        <label class="type-option">
          <input type="radio" name="type" value="WC" checked />
          <div class="icon">🚽</div>
          <div class="name">Tualet</div>
        </label>
        <label class="type-option">
          <input type="radio" name="type" value="Tent" />
          <div class="icon">⛺</div>
          <div class="name">Tendë</div>
        </label>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Data e Dërgimit</label>
        <input id="f-delivery" type="date" />
      </div>
      <div class="field">
        <label>Data e Kthimit</label>
        <input id="f-date" type="date" />
      </div>
    </div>

    <!-- Payment fields — common for all types -->
    <div class="field-row">
      <div class="field">
        <label>Pagesa Mujore (€)</label>
        <input id="f-monthly" type="number" min="0" step="1" placeholder="0" />
      </div>
      <div class="field">
        <label>Mënyra e Pagesës</label>
        <select id="f-payment">
          <option value="cash">💵 Cash</option>
          <option value="bank">🏦 Bankë</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Borxhi Aktual (€)</label>
      <input id="f-debt" type="number" min="0" step="1" placeholder="0" />
    </div>

    <!-- WC-only section -->
    <div id="wc-section">
      <div class="section-label">🚽 Detaje Tualeti</div>

      <div class="field">
        <label>Ditët e Pastrimit</label>
        <div class="day-picker">
          <input type="checkbox" id="cd-1" name="cleanDay" value="1" /><label class="day-label" for="cd-1">E Hënë</label>
          <input type="checkbox" id="cd-2" name="cleanDay" value="2" /><label class="day-label" for="cd-2">E Martë</label>
          <input type="checkbox" id="cd-3" name="cleanDay" value="3" /><label class="day-label" for="cd-3">E Mërkurë</label>
          <input type="checkbox" id="cd-4" name="cleanDay" value="4" /><label class="day-label" for="cd-4">E Enjte</label>
          <input type="checkbox" id="cd-5" name="cleanDay" value="5" /><label class="day-label" for="cd-5">E Premte</label>
          <input type="checkbox" id="cd-6" name="cleanDay" value="6" /><label class="day-label" for="cd-6">E Shtunë</label>
          <input type="checkbox" id="cd-0" name="cleanDay" value="0" /><label class="day-label" for="cd-0">E Diel</label>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" id="btn-cancel">Anulo</button>
      <button class="btn-save"   id="btn-save">Ruaj Porosinë</button>
    </div>
  </div>
</div>

<script>
  // ── Storage ──────────────────────────────────────────────────────────────
  const STORE_KEY = 'rental_orders';

  function loadOrders() {
    return JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
  }

  function saveOrders(orders) {
    localStorage.setItem(STORE_KEY, JSON.stringify(orders));
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function statusOf(order) {
    if (order.returned) return 'returned';
    const d = daysUntil(order.returnDate);
    if (d < 0)  return 'overdue';
    if (d <= 1) return 'due-soon';
    return 'active';
  }

  function returnLabel(order) {
    if (order.returned) return { text: 'Kthyer', cls: 'returned' };
    const d = daysUntil(order.returnDate);
    if (d < 0)  return { text: `${Math.abs(d)}d vonuar`, cls: 'overdue' };
    if (d === 0) return { text: 'Afat sot!', cls: 'soon' };
    if (d === 1) return { text: 'Afat nesër', cls: 'soon' };
    return { text: `${d} ditë mbetur`, cls: 'ok' };
  }

  // ── Cleaning logic ────────────────────────────────────────────────────────
  const DAY_NAMES = ['E Diel', 'E Hënë', 'E Martë', 'E Mërkurë', 'E Enjte', 'E Premte', 'E Shtunë'];

  function getCleaningDays(order) {
    if (order.type !== 'WC') return [];
    // new day-of-week array
    if (Array.isArray(order.cleaningDays) && order.cleaningDays.length) {
      return order.cleaningDays.map(Number);
    }
    return [];
  }

  function daysUntilNextCleaningDay(days) {
    if (!days.length) return null;
    const todayDow = new Date().getDay();
    for (let i = 0; i <= 6; i++) {
      if (days.includes((todayDow + i) % 7)) return i;
    }
    return null;
  }

  function cleaningChip(order) {
    const days = getCleaningDays(order);
    if (!days.length) return null;
    const d = daysUntilNextCleaningDay(days);
    if (d === null) return null;
    if (d === 0) return { text: '🧹 Pastrim Sot!',  cls: 'clean-soon' };
    if (d === 1) return { text: '🧹 Pastrim Nesër', cls: 'clean-soon' };
    const nextDow = (new Date().getDay() + d) % 7;
    return { text: `🧹 ${DAY_NAMES[nextDow]}`, cls: 'clean-ok' };
  }

  function needsCleaningNow(order) {
    if (order.returned) return false;
    const days = getCleaningDays(order);
    if (!days.length) return false;
    return days.includes(new Date().getDay());
  }

  // ── Duration ──────────────────────────────────────────────────────────────
  function durationChip(order) {
    if (!order.deliveryDate || !order.returnDate) return null;
    const days = Math.round(
      (new Date(order.returnDate   + 'T00:00:00') -
       new Date(order.deliveryDate + 'T00:00:00')) / 86400000
    );
    if (days <= 0) return null;
    if (days >= 30) {
      const months = Math.round(days / 30);
      return months === 1 ? '1 muaj+' : `${months} muaj+`;
    }
    return null; // short-term — no badge needed
  }

  // ── Render ────────────────────────────────────────────────────────────────
  let currentFilter = 'all';
  let currentSearch = '';

  function render() {
    let orders = loadOrders();

    // sort: overdue first, then by return date, returned last
    orders.sort((a, b) => {
      if (a.returned && !b.returned) return 1;
      if (!a.returned && b.returned) return -1;
      return (a.returnDate || '').localeCompare(b.returnDate || '');
    });

    const active = orders.filter(o => !o.returned);
    const cleaningToday = active.filter(needsCleaningNow);
    const totalDebt = active.reduce((s, o) => s + (Number(o.currentDebt) || 0), 0);

    // stats
    document.getElementById('stat-active').textContent = active.length;
    document.getElementById('stat-due').textContent    = active.filter(o => daysUntil(o.returnDate) === 1).length;
    document.getElementById('stat-wc').textContent     = active.filter(o => o.type === 'WC').length;
    document.getElementById('stat-tent').textContent   = active.filter(o => o.type === 'Tent').length;
    document.getElementById('stat-clean').textContent  = cleaningToday.length;
    document.getElementById('stat-debt').textContent   = totalDebt ? `${totalDebt}€` : '0€';

    // banners
    const bannerDue = document.getElementById('banner-due');
    const dueTomorrow = active.filter(o => daysUntil(o.returnDate) === 1);
    if (dueTomorrow.length) {
      bannerDue.className = 'banner due show';
      bannerDue.innerHTML = `⚠️ <strong>${dueTomorrow.length} porosi me afat nesër:</strong> ` +
        dueTomorrow.map(o => `<strong>${escHtml(o.client)}</strong> (${o.type})`).join(', ');
    } else {
      bannerDue.className = 'banner due';
    }

    const bannerClean = document.getElementById('banner-clean');
    if (cleaningToday.length) {
      bannerClean.className = 'banner clean show';
      bannerClean.innerHTML = `🧹 <strong>${cleaningToday.length} tualet me pastrim sot/vonuar:</strong> ` +
        cleaningToday.map(o => `<strong>${escHtml(o.client)}</strong>`).join(', ');
    } else {
      bannerClean.className = 'banner clean';
    }

    // filter
    const filtered = orders.filter(o => {
      const s = statusOf(o);
      let matchFilter = true;
      if      (currentFilter === 'active')   matchFilter = s === 'active';
      else if (currentFilter === 'due-soon') matchFilter = s === 'due-soon';
      else if (currentFilter === 'overdue')  matchFilter = s === 'overdue';
      else if (currentFilter === 'returned') matchFilter = s === 'returned';
      else if (currentFilter === 'cleaning') matchFilter = needsCleaningNow(o);

      const q = currentSearch.toLowerCase();
      const matchSearch = !q ||
        (o.client  || '').toLowerCase().includes(q) ||
        (o.address || '').toLowerCase().includes(q) ||
        (o.phone   || '').includes(q);

      return matchFilter && matchSearch;
    });

    const list = document.getElementById('orders-list');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="icon">📋</div><p>Nuk u gjetën porosi.</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(o => {
      const st      = statusOf(o);
      const lbl     = returnLabel(o);
      const isWC    = o.type === 'WC';
      const icon    = isWC ? '🚽' : '⛺';
      const typeCls = isWC ? 'wc' : 'tent';

      // Detail chips (some WC-only, payment chips for all types)
      const chips = [];

      if (isWC) {
        const cl = cleaningChip(o);
        if (cl) chips.push(`<span class="chip ${cl.cls}">${cl.text}</span>`);

        const dur = durationChip(o);
        if (dur) chips.push(`<span class="chip long-term">📅 ${dur}</span>`);
      }

      if (o.monthlyPayment) {
        chips.push(`<span class="chip">${o.paymentMethod === 'bank' ? '🏦' : '💵'} ${o.monthlyPayment}€/muj</span>`);
      }

      if (Number(o.currentDebt) > 0) {
        chips.push(`<span class="chip debt">⚠️ Borxh: ${o.currentDebt}€</span>`);
      }

      if (o.deliveryDate) {
        chips.push(`<span class="chip">📤 ${formatDate(o.deliveryDate)}</span>`);
      }

      const detailsHtml = chips.length
        ? `<div class="card-wc-details">${chips.join('')}</div>`
        : '';

      return `
        <div class="order-card ${st}" data-id="${o.id}">
          <div class="card-main-row">
            <div class="type-badge ${typeCls}">${icon}</div>
            <div class="order-info">
              <div class="client">${escHtml(o.client)}</div>
              <div class="sub">
                <span>📍 ${escHtml(o.address)}</span>
                ${o.phone ? `<span>📞 ${escHtml(o.phone)}</span>` : ''}
              </div>
            </div>
            <div class="order-meta">
              <div class="date">↩ ${formatDate(o.returnDate)}</div>
              <span class="days-tag ${lbl.cls}">${lbl.text}</span>
            </div>
            <div class="order-actions">
              ${!o.returned
                ? `<button class="action-btn" title="Shëno si kthyer" onclick="markReturned('${o.id}')">✅</button>`
                : `<button class="action-btn" title="Shëno si aktive" onclick="markActive('${o.id}')">↩️</button>`}
              <button class="action-btn" title="Ndrysho" onclick="openEdit('${o.id}')">✏️</button>
              <button class="action-btn delete" title="Fshi" onclick="deleteOrder('${o.id}')">🗑️</button>
            </div>
          </div>
          ${detailsHtml}
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Notifications ────────────────────────────────────────────────────────
  function LN() { return window.Capacitor?.Plugins?.LocalNotifications; }

  function notifId(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
    return (h >>> 0) % 2000000000;
  }

  function nextWeekdayAt8(dayJs) {
    const now = new Date();
    let diff = (dayJs - now.getDay() + 7) % 7;
    if (diff === 0 && now.getHours() >= 8) diff = 7;
    const d = new Date();
    d.setDate(d.getDate() + diff);
    d.setHours(8, 0, 0, 0);
    return d;
  }

  async function cancelOrderNotifs(order) {
    if (!LN() || !order?._notifIds?.length) return;
    try { await LN().cancel({ notifications: order._notifIds.map(id => ({ id })) }); } catch (_) {}
  }

  async function scheduleCleaningNotifs(order) {
    if (!LN() || !order.cleaningDays?.length || order.returned) return;
    await cancelOrderNotifs(order);

    const notifications = [];
    const ids = [];

    for (const dayJs of order.cleaningDays) {
      const beforeDayJs = (dayJs - 1 + 7) % 7;
      const idOn     = notifId(order.id + '_on_'     + dayJs);
      const idBefore = notifId(order.id + '_before_' + dayJs);
      ids.push(idOn, idBefore);

      notifications.push({
        id: idOn,
        title: '🧹 Pastrim Sot',
        body: `${order.client} · ${order.address}`,
        schedule: { at: nextWeekdayAt8(dayJs),     every: 'week', allowWhileIdle: true },
      });
      notifications.push({
        id: idBefore,
        title: '🧹 Pastrim Nesër',
        body: `${order.client} · ${order.address}`,
        schedule: { at: nextWeekdayAt8(beforeDayJs), every: 'week', allowWhileIdle: true },
      });
    }

    const orders = loadOrders();
    const o = orders.find(x => x.id === order.id);
    if (o) { o._notifIds = ids; saveOrders(orders); }

    try { await LN().schedule({ notifications }); } catch (e) { console.warn('Notif error', e); }
  }

  async function requestNotifPermission() {
    if (!LN()) return;
    try {
      const p = await LN().checkPermissions();
      if (p.display !== 'granted') await LN().requestPermissions();
    } catch (_) {}
  }

  // ── CRUD ─────────────────────────────────────────────────────────────────
  async function markReturned(id) {
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) {
      o.returned = true;
      await cancelOrderNotifs(o);
      saveOrders(orders);
      render();
    }
  }

  async function markActive(id) {
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) {
      o.returned = false;
      saveOrders(orders);
      await scheduleCleaningNotifs(o);
      render();
    }
  }

  async function deleteOrder(id) {
    if (!confirm('Fshi këtë porosi?')) return;
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) await cancelOrderNotifs(o);
    saveOrders(orders.filter(x => x.id !== id));
    render();
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  let editingId = null;

  function syncWcSection() {
    const type = document.querySelector('input[name="type"]:checked').value;
    document.getElementById('wc-section').classList.toggle('hidden', type !== 'WC');
  }

  function openModal(order) {
    editingId = order ? order.id : null;
    document.getElementById('modal-title').textContent = order ? 'Ndrysho Porosinë' : 'Porosi e Re';

    document.getElementById('f-client').value   = order?.client       || '';
    document.getElementById('f-address').value  = order?.address      || '';
    document.getElementById('f-phone').value    = order?.phone        || '';
    document.getElementById('f-delivery').value = order?.deliveryDate || todayStr();
    document.getElementById('f-date').value     = order?.returnDate   || '';
    document.getElementById('f-monthly').value  = order?.monthlyPayment || '';
    document.getElementById('f-payment').value  = order?.paymentMethod  || 'cash';
    document.getElementById('f-debt').value     = order?.currentDebt    || '';

    const savedDays = Array.isArray(order?.cleaningDays) ? order.cleaningDays.map(Number) : [];
    document.querySelectorAll('input[name="cleanDay"]').forEach(cb => {
      cb.checked = savedDays.includes(Number(cb.value));
    });

    document.querySelectorAll('input[name="type"]').forEach(r => {
      r.checked = r.value === (order ? order.type : 'WC');
    });

    if (!order) {
      const tom = new Date(); tom.setDate(tom.getDate() + 1);
      document.getElementById('f-date').value = tom.toISOString().slice(0,10);
    }

    syncWcSection();
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-client').focus();
  }

  function openEdit(id) {
    const o = loadOrders().find(x => x.id === id);
    if (o) openModal(o);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }

  function saveOrder() {
    const client   = document.getElementById('f-client').value.trim();
    const address  = document.getElementById('f-address').value.trim();
    const phone    = document.getElementById('f-phone').value.trim();
    const type     = document.querySelector('input[name="type"]:checked').value;
    const delivery = document.getElementById('f-delivery').value;
    const date     = document.getElementById('f-date').value;

    if (!client)   { alert('Ju lutem shkruani emrin dhe mbiemrin.'); return; }
    if (!address)  { alert('Ju lutem shkruani lokacionin.'); return; }
    if (!delivery) { alert('Ju lutem zgjidhni datën e dërgimit.'); return; }
    if (!date)     { alert('Ju lutem zgjidhni datën e kthimit.'); return; }

    const paymentData = {
      monthlyPayment: Number(document.getElementById('f-monthly').value) || 0,
      paymentMethod:  document.getElementById('f-payment').value,
      currentDebt:    Number(document.getElementById('f-debt').value) || 0,
    };
    const selectedDays = type === 'WC'
      ? Array.from(document.querySelectorAll('input[name="cleanDay"]:checked')).map(cb => Number(cb.value))
      : [];
    const wcData = type === 'WC' ? {
      cleaningDays: selectedDays,
    } : {};

    const orders = loadOrders();
    let savedOrder;

    if (editingId) {
      const o = orders.find(x => x.id === editingId);
      if (o) { Object.assign(o, { client, address, phone, type, deliveryDate: delivery, returnDate: date, ...paymentData, ...wcData }); savedOrder = o; }
    } else {
      savedOrder = {
        id: crypto.randomUUID(),
        client, address, phone, type,
        deliveryDate: delivery,
        returnDate:   date,
        returned:     false,
        createdAt:    new Date().toISOString(),
        ...paymentData,
        ...wcData
      };
      orders.push(savedOrder);
    }

    saveOrders(orders);
    closeModal();
    render();
    if (savedOrder) scheduleCleaningNotifs(savedOrder);
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  document.getElementById('btn-add').addEventListener('click', () => openModal(null));
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('btn-save').addEventListener('click', saveOrder);

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  document.querySelectorAll('input[name="type"]').forEach(r => {
    r.addEventListener('change', syncWcSection);
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) saveOrder();
  });

  // ── Init ─────────────────────────────────────────────────────────────────
  render();
  requestNotifPermission();
</script>
</body>
</html>
