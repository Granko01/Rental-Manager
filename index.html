<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental-Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #3b6ff0;
      --primary-dark: #2a56d0;
      --danger: #e84040;
      --warning: #f59e0b;
      --success: #22c55e;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--primary); }

    #btn-add {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s;
    }

    #btn-add:hover { background: var(--primary-dark); }

    /* ── Main ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.9rem; font-weight: 700; margin-top: 4px; }
    .stat-card.warn .value { color: var(--warning); }
    .stat-card.blue .value { color: var(--primary); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.83rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.12s;
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-wrap input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px 7px 32px;
      font-size: 0.85rem;
      outline: none;
      background: var(--card);
      width: 200px;
    }

    .search-wrap::before {
      content: "🔍";
      font-size: 0.75rem;
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Orders list ── */
    #orders-list { display: flex; flex-direction: column; gap: 14px; }

    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    /* left accent stripe */
    .order-card::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 12px 0 0 12px;
      background: var(--primary);
    }

    .order-card.due-soon::before { background: var(--warning); }
    .order-card.overdue::before  { background: var(--danger); }
    .order-card.returned::before { background: var(--success); }
    .order-card.returned { opacity: 0.6; }

    .type-badge {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .type-badge.wc   { background: #eff6ff; }
    .type-badge.tent { background: #fdf4ff; }

    .order-info { flex: 1; min-width: 0; }

    .order-info .client {
      font-weight: 700;
      font-size: 0.97rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-info .address {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-meta {
      text-align: right;
      flex-shrink: 0;
    }

    .order-meta .date {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .order-meta .days-tag {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.73rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .days-tag.ok       { background: #f0fdf4; color: var(--success); }
    .days-tag.soon     { background: #fffbeb; color: var(--warning); }
    .days-tag.overdue  { background: #fef2f2; color: var(--danger); }
    .days-tag.returned { background: #f1f5f9; color: var(--muted); }

    .order-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 7px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }

    .action-btn:hover { background: var(--bg); }
    .action-btn.delete:hover { background: #fef2f2; border-color: #fca5a5; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: pop 0.18s ease;
    }

    @keyframes pop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 22px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      color: var(--text);
      background: var(--card);
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,111,240,0.1); }

    /* type selector cards */
    .type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type-option {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      user-select: none;
    }

    .type-option input { display: none; }

    .type-option .icon { font-size: 1.8rem; }
    .type-option .name { font-size: 0.85rem; font-weight: 600; margin-top: 6px; color: var(--text); }

    .type-option:has(input:checked) {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
    }

    .btn-save {
      flex: 2;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-save:hover { background: var(--primary-dark); }

    /* alert banner */
    #alert-banner {
      display: none;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 0.875rem;
      color: #92400e;
    }

    #alert-banner.show { display: block; }

    @media (max-width: 520px) {
      header { padding: 14px 16px; }
      main { padding: 20px 14px; }
      .order-meta { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1><span>Rental</span>-Manager</h1>
  <button id="btn-add">+ Shto Porosi</button>
</header>

<!-- ── Main ── -->
<main>

  <!-- Alert for due-soon orders -->
  <div id="alert-banner"></div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card blue">
      <div class="label">Porosi Aktive</div>
      <div class="value" id="stat-active">0</div>
    </div>
    <div class="stat-card warn">
      <div class="label">Kthehen Nesër</div>
      <div class="value" id="stat-due">0</div>
    </div>
    <div class="stat-card">
      <div class="label">WC Jashtë</div>
      <div class="value" id="stat-wc">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Tenda Jashtë</div>
      <div class="value" id="stat-tent">0</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Të gjitha</button>
    <button class="filter-btn" data-filter="active">Aktive</button>
    <button class="filter-btn" data-filter="due-soon">Afër Afatit</button>
    <button class="filter-btn" data-filter="overdue">Vonuara</button>
    <button class="filter-btn" data-filter="returned">Kthyera</button>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Kërko klient ose adresë…" />
    </div>
  </div>

  <!-- Orders -->
  <div id="orders-list"></div>

</main>

<!-- ── Add/Edit Modal ── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Porosi e Re</h2>

    <div class="field">
      <label>Emri i Klientit</label>
      <input id="f-client" type="text" placeholder="p.sh. Agim Berisha" />
    </div>

    <div class="field">
      <label>Adresa e Shërbimit</label>
      <input id="f-address" type="text" placeholder="p.sh. Rruga Dëshmorët, Tiranë" />
    </div>

    <div class="field">
      <label>Lloji i Shërbimit</label>
      <div class="type-selector">
        <label class="type-option">
          <input type="radio" name="type" value="WC" checked />
          <div class="icon">🚽</div>
          <div class="name">Tualet</div>
        </label>
        <label class="type-option">
          <input type="radio" name="type" value="Tent" />
          <div class="icon">⛺</div>
          <div class="name">Tendë</div>
        </label>
      </div>
    </div>

    <div class="field">
      <label>Data e Kthimit</label>
      <input id="f-date" type="date" />
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" id="btn-cancel">Anulo</button>
      <button class="btn-save" id="btn-save">Ruaj Porosinë</button>
    </div>
  </div>
</div>

<script>
  // ── Storage ──────────────────────────────────────────────────────────────
  const STORE_KEY = 'rental_orders';

  function loadOrders() {
    return JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
  }

  function saveOrders(orders) {
    localStorage.setItem(STORE_KEY, JSON.stringify(orders));
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function daysUntil(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function statusOf(order) {
    if (order.returned) return 'returned';
    const d = daysUntil(order.returnDate);
    if (d < 0)  return 'overdue';
    if (d <= 1) return 'due-soon';
    return 'active';
  }

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function daysLabel(order) {
    if (order.returned) return { text: 'Kthyer', cls: 'returned' };
    const d = daysUntil(order.returnDate);
    if (d < 0)  return { text: `${Math.abs(d)}d vonuar`, cls: 'overdue' };
    if (d === 0) return { text: 'Afat sot!', cls: 'soon' };
    if (d === 1) return { text: 'Afat nesër', cls: 'soon' };
    return { text: `${d} ditë mbetur`, cls: 'ok' };
  }

  // ── Render ───────────────────────────────────────────────────────────────
  let currentFilter = 'all';
  let currentSearch = '';

  function render() {
    let orders = loadOrders();

    // sort: overdue first, then by date
    orders.sort((a, b) => {
      if (a.returned && !b.returned) return 1;
      if (!a.returned && b.returned) return -1;
      return a.returnDate.localeCompare(b.returnDate);
    });

    // stats
    const active = orders.filter(o => !o.returned);
    document.getElementById('stat-active').textContent = active.length;
    document.getElementById('stat-due').textContent    = active.filter(o => daysUntil(o.returnDate) === 1).length;
    document.getElementById('stat-wc').textContent     = active.filter(o => o.type === 'WC').length;
    document.getElementById('stat-tent').textContent   = active.filter(o => o.type === 'Tent').length;

    // alert banner
    const banner = document.getElementById('alert-banner');
    const dueTomorrow = active.filter(o => daysUntil(o.returnDate) === 1);
    if (dueTomorrow.length) {
      banner.className = 'show';
      banner.innerHTML = `⚠️ <strong>${dueTomorrow.length} porosi me afat nesër:</strong> ` +
        dueTomorrow.map(o => `<strong>${o.client}</strong> (${o.type})`).join(', ');
    } else {
      banner.className = '';
    }

    // filter
    const filtered = orders.filter(o => {
      const s = statusOf(o);
      const matchFilter =
        currentFilter === 'all'       ? true :
        currentFilter === 'active'    ? (s === 'active') :
        currentFilter === 'due-soon'  ? (s === 'due-soon') :
        currentFilter === 'overdue'   ? (s === 'overdue') :
        currentFilter === 'returned'  ? (s === 'returned') : true;

      const q = currentSearch.toLowerCase();
      const matchSearch = !q ||
        o.client.toLowerCase().includes(q) ||
        o.address.toLowerCase().includes(q);

      return matchFilter && matchSearch;
    });

    const list = document.getElementById('orders-list');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="icon">📋</div><p>Nuk u gjetën porosi.</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(o => {
      const st  = statusOf(o);
      const lbl = daysLabel(o);
      const icon = o.type === 'WC' ? '🚽' : '⛺';
      const typeCls = o.type === 'WC' ? 'wc' : 'tent';

      return `
        <div class="order-card ${st}" data-id="${o.id}">
          <div class="type-badge ${typeCls}">${icon}</div>
          <div class="order-info">
            <div class="client">${escHtml(o.client)}</div>
            <div class="address">📍 ${escHtml(o.address)}</div>
          </div>
          <div class="order-meta">
            <div class="date">↩ ${formatDate(o.returnDate)}</div>
            <span class="days-tag ${lbl.cls}">${lbl.text}</span>
          </div>
          <div class="order-actions">
            ${!o.returned
              ? `<button class="action-btn" title="Shëno si kthyer" onclick="markReturned('${o.id}')">✅</button>`
              : `<button class="action-btn" title="Shëno si aktive" onclick="markActive('${o.id}')">↩️</button>`}
            <button class="action-btn" title="Ndrysho" onclick="openEdit('${o.id}')">✏️</button>
            <button class="action-btn delete" title="Fshi" onclick="deleteOrder('${o.id}')">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── CRUD ─────────────────────────────────────────────────────────────────
  function markReturned(id) {
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) { o.returned = true; saveOrders(orders); render(); }
  }

  function markActive(id) {
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) { o.returned = false; saveOrders(orders); render(); }
  }

  function deleteOrder(id) {
    if (!confirm('Fshi këtë porosi?')) return;
    saveOrders(loadOrders().filter(o => o.id !== id));
    render();
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  let editingId = null;

  function openModal(order) {
    editingId = order ? order.id : null;
    document.getElementById('modal-title').textContent = order ? 'Ndrysho Porosinë' : 'Porosi e Re';
    document.getElementById('f-client').value  = order ? order.client  : '';
    document.getElementById('f-address').value = order ? order.address : '';
    document.getElementById('f-date').value    = order ? order.returnDate : '';
    document.querySelectorAll('input[name="type"]').forEach(r => {
      r.checked = r.value === (order ? order.type : 'WC');
    });
    if (!order) {
      // default: tomorrow
      const tom = new Date(); tom.setDate(tom.getDate() + 1);
      document.getElementById('f-date').value = tom.toISOString().slice(0,10);
    }
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-client').focus();
  }

  function openEdit(id) {
    const o = loadOrders().find(x => x.id === id);
    if (o) openModal(o);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }

  function saveOrder() {
    const client  = document.getElementById('f-client').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const type    = document.querySelector('input[name="type"]:checked').value;
    const date    = document.getElementById('f-date').value;

    if (!client)  { alert('Ju lutem shkruani emrin e klientit.'); return; }
    if (!address) { alert('Ju lutem shkruani adresën e shërbimit.'); return; }
    if (!date)    { alert('Ju lutem zgjidhni datën e kthimit.'); return; }

    const orders = loadOrders();

    if (editingId) {
      const o = orders.find(x => x.id === editingId);
      if (o) { o.client = client; o.address = address; o.type = type; o.returnDate = date; }
    } else {
      orders.push({
        id: crypto.randomUUID(),
        client, address, type,
        returnDate: date,
        returned: false,
        createdAt: new Date().toISOString()
      });
    }

    saveOrders(orders);
    closeModal();
    render();
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  document.getElementById('btn-add').addEventListener('click', () => openModal(null));
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('btn-save').addEventListener('click', saveOrder);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  // keyboard shortcut: Escape closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) saveOrder();
  });

  // ── Init ─────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
