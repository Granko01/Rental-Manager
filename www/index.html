<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental-Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #3b6ff0;
      --primary-dark: #2a56d0;
      --danger: #e84040;
      --warning: #f59e0b;
      --success: #22c55e;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--primary); }

    #btn-add {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s;
    }

    #btn-add:hover { background: var(--primary-dark); }

    /* ── Main ── */
    main {
      max-width: 1020px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .stat-card .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.75rem; font-weight: 700; margin-top: 4px; }
    .stat-card.warn   .value { color: var(--warning); }
    .stat-card.blue   .value { color: var(--primary); }
    .stat-card.danger .value { color: var(--danger); }
    .stat-card.green  .value { color: var(--success); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.12s;
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-wrap input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px 7px 32px;
      font-size: 0.85rem;
      outline: none;
      background: var(--card);
      width: 210px;
    }

    .search-wrap::before {
      content: "🔍";
      font-size: 0.75rem;
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Orders list ── */
    #orders-list { display: flex; flex-direction: column; gap: 12px; }

    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 15px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    .order-card::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 12px 0 0 12px;
      background: var(--primary);
    }

    .order-card.due-soon::before { background: var(--warning); }
    .order-card.overdue::before  { background: var(--danger); }
    .order-card.returned::before { background: var(--success); }
    .order-card.returned { opacity: 0.6; }

    /* main row inside card */
    .card-main-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .type-badge {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .type-badge.wc   { background: #eff6ff; }
    .type-badge.tent { background: #fdf4ff; }

    .order-info { flex: 1; min-width: 0; }

    .order-info .client {
      font-weight: 700;
      font-size: 0.97rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-info .sub {
      font-size: 0.81rem;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .order-meta {
      text-align: right;
      flex-shrink: 0;
    }

    .order-meta .date { font-size: 0.85rem; font-weight: 600; }

    .order-meta .days-tag {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.73rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .days-tag.ok       { background: #f0fdf4; color: var(--success); }
    .days-tag.soon     { background: #fffbeb; color: var(--warning); }
    .days-tag.overdue  { background: #fef2f2; color: var(--danger); }
    .days-tag.returned { background: #f1f5f9; color: var(--muted); }

    .order-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 7px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }

    .action-btn:hover        { background: var(--bg); }
    .action-btn.delete:hover { background: #fef2f2; border-color: #fca5a5; }

    /* WC detail chips row */
    .card-wc-details {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding-left: 58px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.76rem;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
      white-space: nowrap;
    }

    .chip.clean-ok      { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
    .chip.clean-soon    { background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .chip.clean-overdue { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
    .chip.debt          { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    .chip.long-term     { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .chip.bank          { background: #f5f3ff; border-color: #ddd6fe; color: #5b21b6; }

    /* ── Comments ── */
    .card-comments {
      padding-left: 58px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .comments-toggle {
      background: none;
      border: none;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 0;
      font-weight: 600;
    }

    .comments-toggle:hover { color: var(--primary); }

    .comments-body { display: none; margin-top: 6px; }
    .comments-body.open { display: block; }

    .comment-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .comment-item:last-of-type { border-bottom: none; }

    .comment-text {
      flex: 1;
      font-size: 0.83rem;
      color: var(--text);
      line-height: 1.4;
    }

    .comment-time {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .comment-delete {
      background: none;
      border: none;
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--muted);
      padding: 0 2px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .comment-delete:hover { color: var(--danger); }

    .add-comment-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .add-comment-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.82rem;
      outline: none;
      background: var(--bg);
    }

    .add-comment-row input:focus {
      border-color: var(--primary);
      background: var(--card);
    }

    .add-comment-row button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-comment-row button:hover { background: var(--primary-dark); }

    .modal-comments { margin-top: 4px; }

    .modal-comment-list {
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .modal-comment-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.83rem;
    }

    @media (max-width: 540px) {
      .card-comments { padding-left: 0; }
    }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; }

    /* ── Alert banners ── */
    .banner {
      display: none;
      border-radius: var(--radius);
      padding: 13px 16px;
      margin-bottom: 10px;
      font-size: 0.875rem;
    }

    .banner.show  { display: block; }
    .banner.due   { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .banner.clean { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px;
      overflow-y: auto;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: pop 0.18s ease;
      margin: auto;
    }

    @keyframes pop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      color: var(--text);
      background: var(--card);
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,111,240,0.1);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }

    .field-row .field { margin-bottom: 0; }

    /* type selector cards */
    .type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type-option {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      user-select: none;
    }

    .type-option input { display: none; }
    .type-option .icon { font-size: 1.8rem; }
    .type-option .name { font-size: 0.85rem; font-weight: 600; margin-top: 6px; color: var(--text); }

    .type-option:has(input:checked) {
      border-color: var(--primary);
      background: #eff6ff;
    }

    /* WC-specific section in modal */
    #wc-section {
      border-top: 1px solid var(--border);
      margin-top: 4px;
      padding-top: 16px;
    }

    #wc-section.hidden { display: none; }

    /* Day-of-week picker */
    .day-picker {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .day-picker input { display: none; }

    .day-label {
      display: inline-block;
      padding: 6px 11px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      background: var(--card);
      transition: all 0.12s;
      user-select: none;
    }

    .day-picker input:checked + .day-label {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Cleaning frequency selector */
    .freq-selector {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .freq-option {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      user-select: none;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .freq-option input { display: none; }

    .freq-option:has(input:checked) {
      border-color: var(--primary);
      background: #eff6ff;
      color: var(--primary);
    }

    #custom-days-wrap { margin-top: 10px; }
    #custom-days-wrap.hidden { display: none; }

    #day-picker-wrap.hidden { display: none; }
    #month-day-picker-wrap.hidden { display: none; }

    .month-calendar {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .month-calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--primary);
      color: #fff;
    }

    .month-calendar-nav button {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.15rem;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1;
    }

    .month-calendar-nav button:hover { background: rgba(255,255,255,0.2); }
    .month-calendar-nav span { font-weight: 700; font-size: 0.88rem; }

    .month-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 8px;
      background: var(--bg);
    }

    .cal-day-header {
      text-align: center;
      font-size: 0.66rem;
      font-weight: 700;
      color: var(--muted);
      padding: 3px 2px 5px;
      text-transform: uppercase;
    }

    .cal-day-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      background: var(--card);
      transition: all 0.12s;
      padding: 8px 2px;
      user-select: none;
    }

    .cal-day-cell:hover { background: #eff6ff; }
    .cal-day-cell.selected { background: var(--primary); color: #fff; }
    .cal-day-cell.faded { color: #cbd5e1; }
    .cal-day-cell.faded:hover { background: #f8fafc; }
    .cal-day-cell.empty { background: transparent; pointer-events: none; }
    .cal-day-cell.disabled { color: #d1d5db; pointer-events: none; background: var(--card); }
    .cal-day-cell.disabled:hover { background: var(--card); }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-cancel {
      flex: 1;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
    }

    .btn-save {
      flex: 2;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-save:hover { background: var(--primary-dark); }

    @media (max-width: 540px) {
      header { padding: 14px 16px; }
      main { padding: 20px 12px; }
      .order-meta { display: none; }
      .card-wc-details { padding-left: 0; }
      .field-row { grid-template-columns: 1fr; }
    }

    /* ── Login screen ── */
    .login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .login-screen.hidden { display: none; }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    }

    .login-logo { font-size: 2.8rem; text-align: center; margin-bottom: 10px; }
    .login-card h2 { text-align: center; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .login-sub { text-align: center; color: var(--muted); font-size: 0.83rem; margin-bottom: 26px; }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--muted);
      user-select: none;
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .login-error {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 10px;
      min-height: 18px;
      text-align: center;
    }

    /* logout button in header */
    #btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    #btn-logout:hover { background: #fef2f2; border-color: #fca5a5; color: var(--danger); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1><span>Rental</span>-Manager</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="btn-logout">Dil 🚪</button>
    <button id="btn-add">+ Shto Porosi</button>
  </div>
</header>

<!-- ── Main ── -->
<main>

  <!-- Banners -->
  <div id="banner-due"   class="banner due"></div>
  <div id="banner-clean" class="banner clean"></div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card blue">
      <div class="label">Porosi Aktive</div>
      <div class="value" id="stat-active">0</div>
    </div>
    <div class="stat-card warn">
      <div class="label">Kthehen Nesër</div>
      <div class="value" id="stat-due">0</div>
    </div>
    <div class="stat-card">
      <div class="label">WC Jashtë</div>
      <div class="value" id="stat-wc">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Tenda Jashtë</div>
      <div class="value" id="stat-tent">0</div>
    </div>
    <div class="stat-card danger">
      <div class="label">Pastrim Sot</div>
      <div class="value" id="stat-clean">0</div>
    </div>
    <div class="stat-card warn">
      <div class="label">Borxhi Total</div>
      <div class="value" id="stat-debt">0€</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Të gjitha</button>
    <button class="filter-btn" data-filter="active">Aktive</button>
    <button class="filter-btn" data-filter="due-soon">Afër Afatit</button>
    <button class="filter-btn" data-filter="overdue">Vonuara</button>
    <button class="filter-btn" data-filter="returned">Kthyera</button>
    <button class="filter-btn" data-filter="cleaning">🧹 Pastrim Sot</button>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Kërko klient, adresë, telefon…" />
    </div>
  </div>

  <!-- Orders -->
  <div id="orders-list"></div>

</main>

<!-- ── Login Screen ── -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">🏠</div>

    <p class="login-sub">Hyr në llogari për të vazhduar</p>

<script>
  // ── Storage ──────────────────────────────────────────────────────────────
  const STORE_KEY = 'rental_orders';

  function loadOrders() {
    return JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
  }

  function saveOrders(orders) {
    localStorage.setItem(STORE_KEY, JSON.stringify(orders));
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function statusOf(order) {
    if (order.returned) return 'returned';
    const d = daysUntil(order.returnDate);
    if (d < 0)  return 'overdue';
    if (d <= 1) return 'due-soon';
    return 'active';
  }

  function returnLabel(order) {
    if (order.returned) return { text: 'Kthyer', cls: 'returned' };
    const d = daysUntil(order.returnDate);
    if (d < 0)  return { text: `${Math.abs(d)}d vonuar`, cls: 'overdue' };
    if (d === 0) return { text: 'Afat sot!', cls: 'soon' };
    if (d === 1) return { text: 'Afat nesër', cls: 'soon' };
    return { text: `${d} ditë mbetur`, cls: 'ok' };
  }

  // ── Cleaning logic ────────────────────────────────────────────────────────
  const DAY_NAMES = ['E Diel', 'E Hënë', 'E Martë', 'E Mërkurë', 'E Enjte', 'E Premte', 'E Shtunë'];
  const FREQ_LABELS = { weekly: 'Çdo Javë', biweekly: 'Çdo 2 Javë', monthly: 'Çdo Muaj', custom: 'Custom' };

  function getCleaningDays(order) {
    if (order.type !== 'WC') return [];
    if (Array.isArray(order.cleaningDays) && order.cleaningDays.length) {
      return order.cleaningDays.map(Number);
    }
    return [];
  }

  function getNextCleaningDate(order) {
    if (order.type !== 'WC') return null;
    const freq = order.cleaningFrequency || 'weekly';
    const today = new Date(); today.setHours(0, 0, 0, 0);

    if (freq === 'custom') {
      const intervalDays = Number(order.cleaningCustomDays) || 7;
      const anchor = order.deliveryDate ? new Date(order.deliveryDate + 'T00:00:00') : new Date(order.createdAt || today);
      anchor.setHours(0, 0, 0, 0);
      const diffMs = today - anchor;
      const diffDays = Math.floor(diffMs / 86400000);
      if (diffDays < 0) return anchor;
      const cyclesPassed = Math.floor(diffDays / intervalDays);
      let next = new Date(anchor);
      next.setDate(next.getDate() + cyclesPassed * intervalDays);
      if (next < today) next.setDate(next.getDate() + intervalDays);
      return next;
    }

    const days = getCleaningDays(order);
    if (!days.length) return null;

    if (freq === 'weekly') {
      const todayDow = today.getDay();
      for (let i = 0; i <= 6; i++) {
        if (days.includes((todayDow + i) % 7)) {
          const d = new Date(today);
          d.setDate(d.getDate() + i);
          return d;
        }
      }
      return null;
    }

    if (freq === 'biweekly') {
      const anchor = order.deliveryDate ? new Date(order.deliveryDate + 'T00:00:00') : new Date(order.createdAt || today);
      anchor.setHours(0, 0, 0, 0);
      const weeksSinceAnchor = Math.floor((today - anchor) / (7 * 86400000));
      const isOnWeek = weeksSinceAnchor % 2 === 0;
      for (let i = 0; i <= 13; i++) {
        const candidate = new Date(today);
        candidate.setDate(candidate.getDate() + i);
        const weekNum = Math.floor((candidate - anchor) / (7 * 86400000));
        if (weekNum % 2 === 0 && days.includes(candidate.getDay())) return candidate;
      }
      return null;
    }

    if (freq === 'monthly') {
      const datesOfMonth = (order.cleaningDaysOfMonth || []).map(Number).sort((a, b) => a - b);
      if (!datesOfMonth.length) return null;
      const todayDate = today.getDate();
      // try current month
      for (const d of datesOfMonth) {
        if (d >= todayDate) {
          const candidate = new Date(today.getFullYear(), today.getMonth(), d);
          if (candidate.getMonth() === today.getMonth()) return candidate;
        }
      }
      // next month — first selected date
      return new Date(today.getFullYear(), today.getMonth() + 1, datesOfMonth[0]);
    }

    return null;
  }

  function daysUntilNextCleaning(order) {
    const next = getNextCleaningDate(order);
    if (!next) return null;
    const today = new Date(); today.setHours(0, 0, 0, 0);
    return Math.round((next - today) / 86400000);
  }

  function cleaningChip(order) {
    const d = daysUntilNextCleaning(order);
    if (d === null) return null;
    const next = getNextCleaningDate(order);
    const dateStr = formatDate(next.toISOString().slice(0, 10));
    if (d === 0) return { text: `🧹 Pastrim Sot!`, cls: 'clean-overdue' };
    if (d === 1) return { text: `🧹 Pastrim Nesër (${dateStr})`, cls: 'clean-soon' };
    if (d <= 3) return { text: `🧹 Pas ${d} ditësh (${dateStr})`, cls: 'clean-soon' };
    const nextDow = next.getDay();
    return { text: `🧹 ${DAY_NAMES[nextDow]} (${dateStr})`, cls: 'clean-ok' };
  }

  function cleaningFreqChip(order) {
    if (order.type !== 'WC' || !order.cleaningFrequency) return null;
    const freq = order.cleaningFrequency;
    if (freq === 'custom') {
      return { text: `🔄 Çdo ${order.cleaningCustomDays || '?'} ditë`, cls: '' };
    }
    if (freq === 'monthly' && Array.isArray(order.cleaningDaysOfMonth) && order.cleaningDaysOfMonth.length) {
      const dates = [...order.cleaningDaysOfMonth].sort((a, b) => a - b).join(', ');
      return { text: `🔄 Çdo Muaj (${dates})`, cls: '' };
    }
    return { text: `🔄 ${FREQ_LABELS[freq]}`, cls: '' };
  }

  function needsCleaningNow(order) {
    if (order.returned) return false;
    const d = daysUntilNextCleaning(order);
    return d === 0;
  }

  // ── Duration ──────────────────────────────────────────────────────────────
  function durationChip(order) {
    if (!order.deliveryDate || !order.returnDate) return null;
    const days = Math.round(
      (new Date(order.returnDate   + 'T00:00:00') -
       new Date(order.deliveryDate + 'T00:00:00')) / 86400000
    );
    if (days <= 0) return null;
    if (days >= 30) {
      const months = Math.round(days / 30);
      return months === 1 ? '1 muaj+' : `${months} muaj+`;
    }
    return null; // short-term — no badge needed
  }

  // ── Render ────────────────────────────────────────────────────────────────
  let currentFilter = 'all';
  let currentSearch = '';

  function render() {
    let orders = loadOrders();

    // sort: overdue first, then by return date, returned last
    orders.sort((a, b) => {
      if (a.returned && !b.returned) return 1;
      if (!a.returned && b.returned) return -1;
      return (a.returnDate || '').localeCompare(b.returnDate || '');
    });

    const active = orders.filter(o => !o.returned);
    const cleaningToday = active.filter(needsCleaningNow);
    const totalDebt = active.reduce((s, o) => s + (Number(o.currentDebt) || 0), 0);

    // stats
    document.getElementById('stat-active').textContent = active.length;
    document.getElementById('stat-due').textContent    = active.filter(o => daysUntil(o.returnDate) === 1).length;
    document.getElementById('stat-wc').textContent     = active.filter(o => o.type === 'WC').length;
    document.getElementById('stat-tent').textContent   = active.filter(o => o.type === 'Tent').length;
    document.getElementById('stat-clean').textContent  = cleaningToday.length;
    document.getElementById('stat-debt').textContent   = totalDebt ? `${totalDebt}€` : '0€';

    // banners
    const bannerDue = document.getElementById('banner-due');
    const dueTomorrow = active.filter(o => daysUntil(o.returnDate) === 1);
    if (dueTomorrow.length) {
      bannerDue.className = 'banner due show';
      bannerDue.innerHTML = `⚠️ <strong>${dueTomorrow.length} porosi me afat nesër:</strong> ` +
        dueTomorrow.map(o => `<strong>${escHtml(o.client)}</strong> (${o.type})`).join(', ');
    } else {
      bannerDue.className = 'banner due';
    }

    const cleaningTomorrow = active.filter(o => daysUntilNextCleaning(o) === 1);

    const bannerClean = document.getElementById('banner-clean');
    if (cleaningToday.length || cleaningTomorrow.length) {
      bannerClean.className = 'banner clean show';
      let msg = '';
      if (cleaningToday.length) {
        msg += `🧹 <strong>${cleaningToday.length} tualet me pastrim sot:</strong> ` +
          cleaningToday.map(o => `<strong>${escHtml(o.client)}</strong>`).join(', ');
      }
      if (cleaningTomorrow.length) {
        if (msg) msg += '<br>';
        msg += `🧹 <strong>${cleaningTomorrow.length} tualet me pastrim nesër:</strong> ` +
          cleaningTomorrow.map(o => `<strong>${escHtml(o.client)}</strong>`).join(', ');
      }
      bannerClean.innerHTML = msg;
    } else {
      bannerClean.className = 'banner clean';
    }

    // filter
    const filtered = orders.filter(o => {
      const s = statusOf(o);
      let matchFilter = true;
      if      (currentFilter === 'active')   matchFilter = s === 'active';
      else if (currentFilter === 'due-soon') matchFilter = s === 'due-soon';
      else if (currentFilter === 'overdue')  matchFilter = s === 'overdue';
      else if (currentFilter === 'returned') matchFilter = s === 'returned';
      else if (currentFilter === 'cleaning') matchFilter = needsCleaningNow(o);

      const q = currentSearch.toLowerCase();
      const matchSearch = !q ||
        (o.client  || '').toLowerCase().includes(q) ||
        (o.address || '').toLowerCase().includes(q) ||
        (o.phone   || '').includes(q);

      return matchFilter && matchSearch;
    });

    const list = document.getElementById('orders-list');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="icon">📋</div><p>Nuk u gjetën porosi.</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(o => {
      const st      = statusOf(o);
      const lbl     = returnLabel(o);
      const isWC    = o.type === 'WC';
      const icon    = isWC ? '🚽' : '⛺';
      const typeCls = isWC ? 'wc' : 'tent';

      // Detail chips (some WC-only, payment chips for all types)
      const chips = [];

      if (isWC) {
        const fq = cleaningFreqChip(o);
        if (fq) chips.push(`<span class="chip ${fq.cls}">${fq.text}</span>`);

        const cl = cleaningChip(o);
        if (cl) chips.push(`<span class="chip ${cl.cls}">${cl.text}</span>`);

        const dur = durationChip(o);
        if (dur) chips.push(`<span class="chip long-term">📅 ${dur}</span>`);
      }

      if (o.monthlyPayment) {
        chips.push(`<span class="chip">${o.paymentMethod === 'bank' ? '🏦' : '💵'} ${o.monthlyPayment}€/muj</span>`);
      }

      if (Number(o.currentDebt) > 0) {
        chips.push(`<span class="chip debt">⚠️ Borxh: ${o.currentDebt}€</span>`);
      }

      if (Number(o.dailyDebt) > 0) {
        chips.push(`<span class="chip debt">📅 Borxh Ditor: ${o.dailyDebt}€</span>`);
      }

      if (o.deliveryDate) {
        chips.push(`<span class="chip">📤 ${formatDate(o.deliveryDate)}</span>`);
      }

      if (o.returnDate) {
        chips.push(`<span class="chip days-tag ${lbl.cls}">↩ ${formatDate(o.returnDate)} · ${lbl.text}</span>`);
      }

      const detailsHtml = chips.length
        ? `<div class="card-wc-details">${chips.join('')}</div>`
        : '';

      const comments = Array.isArray(o.comments) ? o.comments : [];
      const commentsHtml = `
        <div class="card-comments">
          <button class="comments-toggle" onclick="toggleComments('${o.id}')">
            💬 ${comments.length ? comments.length + ' koment' + (comments.length > 1 ? 'e' : '') : 'Shto koment'}
          </button>
          <div class="comments-body" data-order="${o.id}">
            ${comments.map(c => `
              <div class="comment-item">
                <span class="comment-text">${escHtml(c.text)}</span>
                <span class="comment-time">${formatCommentTime(c.createdAt)}</span>
                <button class="comment-delete" title="Fshi" onclick="deleteComment('${o.id}','${c.id}')">✕</button>
              </div>`).join('')}
            <div class="add-comment-row" data-order="${o.id}">
              <input type="text" placeholder="Shkruaj koment…" onkeydown="if(event.key==='Enter')addComment('${o.id}')" />
              <button onclick="addComment('${o.id}')">Shto</button>
            </div>
          </div>
        </div>`;

      return `
        <div class="order-card ${st}" data-id="${o.id}">
          <div class="card-main-row">
            <div class="type-badge ${typeCls}">${icon}</div>
            <div class="order-info">
              <div class="client">${escHtml(o.client)}</div>
              <div class="sub">
                <span>📍 ${escHtml(o.address)}</span>
                ${o.phone ? `<span>📞 ${escHtml(o.phone)}</span>` : ''}
              </div>
            </div>
            <div class="order-meta">
              <div class="date">↩ ${formatDate(o.returnDate)}</div>
              <span class="days-tag ${lbl.cls}">${lbl.text}</span>
            </div>
            <div class="order-actions">
              ${!o.returned
                ? `<button class="action-btn" title="Shëno si kthyer" onclick="markReturned('${o.id}')">✅</button>`
                : `<button class="action-btn" title="Shëno si aktive" onclick="markActive('${o.id}')">↩️</button>`}
              <button class="action-btn" title="Ndrysho" onclick="openEdit('${o.id}')">✏️</button>
              <button class="action-btn delete" title="Fshi" onclick="deleteOrder('${o.id}')">🗑️</button>
            </div>
          </div>
          ${detailsHtml}
          ${commentsHtml}
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Notifications ────────────────────────────────────────────────────────
  function LN() { return window.Capacitor?.Plugins?.LocalNotifications; }

  function notifId(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
    return (h >>> 0) % 2000000000;
  }

  async function cancelOrderNotifs(order) {
    if (!LN() || !order?._notifIds?.length) return;
    try { await LN().cancel({ notifications: order._notifIds.map(id => ({ id })) }); } catch (_) {}
  }

  async function scheduleCleaningNotifs(order) {
    if (!LN() || order.returned) return;
    const freq = order.cleaningFrequency || 'weekly';
    if (freq === 'custom' && !order.cleaningCustomDays) return;
    if (freq !== 'custom' && (!order.cleaningDays || !order.cleaningDays.length)) return;
    await cancelOrderNotifs(order);

    const next = getNextCleaningDate(order);
    if (!next) return;

    const notifications = [];
    const ids = [];

    const idOn = notifId(order.id + '_clean_on');
    const idBefore = notifId(order.id + '_clean_before');
    ids.push(idOn, idBefore);

    const onDate = new Date(next);
    onDate.setHours(8, 0, 0, 0);

    const beforeDate = new Date(next);
    beforeDate.setDate(beforeDate.getDate() - 1);
    beforeDate.setHours(8, 0, 0, 0);

    const now = new Date();

    if (onDate > now) {
      notifications.push({
        id: idOn,
        title: '🧹 Pastrim Sot!',
        body: `${order.client} · ${order.address}`,
        schedule: { at: onDate, allowWhileIdle: true },
      });
    }

    if (beforeDate > now) {
      notifications.push({
        id: idBefore,
        title: '🧹 Pastrim Nesër',
        body: `${order.client} · ${order.address}`,
        schedule: { at: beforeDate, allowWhileIdle: true },
      });
    }

    const orders = loadOrders();
    const o = orders.find(x => x.id === order.id);
    if (o) { o._notifIds = ids; saveOrders(orders); }

    if (notifications.length) {
      try { await LN().schedule({ notifications }); } catch (e) { console.warn('Notif error', e); }
    }
  }

  async function rescheduleAllNotifs() {
    const orders = loadOrders();
    for (const o of orders) {
      if (!o.returned && o.type === 'WC') {
        await scheduleCleaningNotifs(o);
      }
    }
  }

  async function requestNotifPermission() {
    if (!LN()) return;
    try {
      const p = await LN().checkPermissions();
      if (p.display !== 'granted') await LN().requestPermissions();
    } catch (_) {}
  }

  // ── CRUD ─────────────────────────────────────────────────────────────────
  async function markReturned(id) {
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) {
      o.returned = true;
      await cancelOrderNotifs(o);
      saveOrders(orders);
      render();
    }
  }

  async function markActive(id) {
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) {
      o.returned = false;
      saveOrders(orders);
      await scheduleCleaningNotifs(o);
      render();
    }
  }

  async function deleteOrder(id) {
    if (!confirm('Fshi këtë porosi?')) return;
    const orders = loadOrders();
    const o = orders.find(x => x.id === id);
    if (o) await cancelOrderNotifs(o);
    saveOrders(orders.filter(x => x.id !== id));
    render();
  }

  // ── Comments ──────────────────────────────────────────────────────────────
  function formatCommentTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    const day = String(d.getDate()).padStart(2, '0');
    const mon = String(d.getMonth() + 1).padStart(2, '0');
    const hr  = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${day}/${mon} ${hr}:${min}`;
  }

  function toggleComments(orderId) {
    const body = document.querySelector(`.comments-body[data-order="${orderId}"]`);
    if (body) body.classList.toggle('open');
  }

  function addComment(orderId) {
    const input = document.querySelector(`.add-comment-row[data-order="${orderId}"] input`);
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;

    const orders = loadOrders();
    const o = orders.find(x => x.id === orderId);
    if (!o) return;
    if (!Array.isArray(o.comments)) o.comments = [];
    o.comments.push({ id: crypto.randomUUID(), text, createdAt: new Date().toISOString() });
    saveOrders(orders);
    render();
  }

  function deleteComment(orderId, commentId) {
    const orders = loadOrders();
    const o = orders.find(x => x.id === orderId);
    if (!o || !Array.isArray(o.comments)) return;
    o.comments = o.comments.filter(c => c.id !== commentId);
    saveOrders(orders);
    render();
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  let editingId = null;

  // ── Month Calendar ────────────────────────────────────────────────────────
  const MONTH_NAMES_SQ = ['Janar','Shkurt','Mars','Prill','Maj','Qershor',
                           'Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];
  let calYear  = new Date().getFullYear();
  let calMonth = new Date().getMonth();

  function renderMonthCalendar() {
    const grid  = document.getElementById('cal-grid');
    const label = document.getElementById('cal-month-label');
    if (!grid || !label) return;

    label.textContent = `${MONTH_NAMES_SQ[calMonth]} ${calYear}`;

    const checkedDays = new Set(
      Array.from(document.querySelectorAll('input[name="cleanDayOfMonth"]:checked'))
           .map(cb => Number(cb.value))
    );

    // Date constraints
    const today = new Date();
    const todayYear  = today.getFullYear();
    const todayMonth = today.getMonth();
    const todayDate  = today.getDate();

    const deliveryVal = document.getElementById('f-delivery')?.value;
    let delYear = null, delMonth = null, delDay = null;
    if (deliveryVal) {
      const p = deliveryVal.split('-').map(Number);
      delYear = p[0]; delMonth = p[1] - 1; delDay = p[2];
    }

    const returnVal = document.getElementById('f-date')?.value;
    let retYear = null, retMonth = null, retDay = null;
    if (returnVal) {
      const p = returnVal.split('-').map(Number);
      retYear = p[0]; retMonth = p[1] - 1; retDay = p[2];
    }

    // Whole-month disabled checks
    const isBeforeToday    = calYear < todayYear || (calYear === todayYear && calMonth < todayMonth);
    const isBeforeDelivery = delYear !== null && (calYear < delYear || (calYear === delYear && calMonth < delMonth));
    const isAfterReturn    = retYear !== null && (calYear > retYear || (calYear === retYear && calMonth > retMonth));
    const wholeMonthOff    = isBeforeToday || isBeforeDelivery || isAfterReturn;

    const firstDow    = new Date(calYear, calMonth, 1).getDay();
    const startOffset = (firstDow + 6) % 7; // Mon=0
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

    const headers = ['H','Ma','Më','En','Pr','Sh','D'];
    let html = headers.map(h => `<div class="cal-day-header">${h}</div>`).join('');

    for (let i = 0; i < startOffset; i++) {
      html += `<div class="cal-day-cell empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      let disabled = wholeMonthOff;

      if (!disabled) {
        // Current month: days before today
        if (calYear === todayYear && calMonth === todayMonth && d < todayDate) disabled = true;
        // Delivery month: days on or before delivery day (WC just arrived, clean from next day)
        if (delYear !== null && calYear === delYear && calMonth === delMonth && d <= delDay) disabled = true;
        // Return month: days after return day (WC already gone)
        if (retYear !== null && calYear === retYear && calMonth === retMonth && d > retDay) disabled = true;
      }

      const selected = !disabled && checkedDays.has(d);
      const cls = ['cal-day-cell', selected ? 'selected' : '', disabled ? 'disabled' : ''].filter(Boolean).join(' ');
      const click = disabled ? '' : `onclick="toggleCalDay(${d})"`;
      html += `<div class="${cls}" ${click}>${d}</div>`;
    }

    grid.innerHTML = html;
  }

  function toggleCalDay(d) {
    const cb = document.getElementById(`md-${d}`);
    if (cb) { cb.checked = !cb.checked; renderMonthCalendar(); }
  }

  function calNavigate(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    renderMonthCalendar();
  }

  function syncWcSection() {
    const type = document.querySelector('input[name="type"]:checked').value;
    document.getElementById('wc-section').classList.toggle('hidden', type !== 'WC');
    syncCustomDays();
  }

  function syncCustomDays() {
    const freq = document.querySelector('input[name="cleanFreq"]:checked')?.value;
    document.getElementById('custom-days-wrap').classList.toggle('hidden', freq !== 'custom');
    document.getElementById('day-picker-wrap').classList.toggle('hidden', freq === 'custom' || freq === 'monthly');
    const showMonthly = freq === 'monthly';
    document.getElementById('month-day-picker-wrap').classList.toggle('hidden', !showMonthly);
    if (showMonthly) renderMonthCalendar();
  }

  function openModal(order) {
    editingId = order ? order.id : null;
    document.getElementById('modal-title').textContent = order ? 'Ndrysho Porosinë' : 'Porosi e Re';

    document.getElementById('f-client').value   = order?.client       || '';
    document.getElementById('f-address').value  = order?.address      || '';
    document.getElementById('f-phone').value    = order?.phone        || '';
    document.getElementById('f-delivery').value = order?.deliveryDate || todayStr();
    document.getElementById('f-date').value     = order?.returnDate   || '';
    document.getElementById('f-monthly').value  = order?.monthlyPayment || '';
    document.getElementById('f-payment').value  = order?.paymentMethod  || 'cash';
    document.getElementById('f-debt').value       = order?.currentDebt || '';
    document.getElementById('f-daily-debt').value = order?.dailyDebt  || '';

    const savedFreq = order?.cleaningFrequency || 'weekly';
    document.querySelectorAll('input[name="cleanFreq"]').forEach(r => {
      r.checked = r.value === savedFreq;
    });
    document.getElementById('f-custom-days').value = order?.cleaningCustomDays || '';

    const savedDays = Array.isArray(order?.cleaningDays) ? order.cleaningDays.map(Number) : [];
    document.querySelectorAll('input[name="cleanDay"]').forEach(cb => {
      cb.checked = savedDays.includes(Number(cb.value));
    });

    const savedDaysOfMonth = Array.isArray(order?.cleaningDaysOfMonth) ? order.cleaningDaysOfMonth.map(Number) : [];
    document.querySelectorAll('input[name="cleanDayOfMonth"]').forEach(cb => {
      cb.checked = savedDaysOfMonth.includes(Number(cb.value));
    });

    syncCustomDays();

    document.querySelectorAll('input[name="type"]').forEach(r => {
      r.checked = r.value === (order ? order.type : 'WC');
    });

    document.getElementById('f-comment').value = '';
    const commentsList = document.getElementById('modal-comments');
    const comments = order?.comments || [];
    if (comments.length) {
      commentsList.innerHTML = '<div class="modal-comment-list">' +
        comments.map(c => `<div class="modal-comment-item">
          <span class="comment-text">${escHtml(c.text)}</span>
          <span class="comment-time">${formatCommentTime(c.createdAt)}</span>
        </div>`).join('') + '</div>';
    } else {
      commentsList.innerHTML = '';
    }

    if (!order) {
      const tom = new Date(); tom.setDate(tom.getDate() + 1);
      document.getElementById('f-date').value = tom.toISOString().slice(0,10);
    }

    // Init calendar to delivery month (or current month)
    const calInitVal = document.getElementById('f-delivery').value;
    if (calInitVal) {
      const p = calInitVal.split('-').map(Number);
      calYear = p[0]; calMonth = p[1] - 1;
    } else {
      calYear = new Date().getFullYear();
      calMonth = new Date().getMonth();
    }

    syncWcSection();
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-client').focus();
  }

  function openEdit(id) {
    const o = loadOrders().find(x => x.id === id);
    if (o) openModal(o);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }

  function saveOrder() {
    const client   = document.getElementById('f-client').value.trim();
    const address  = document.getElementById('f-address').value.trim();
    const phone    = document.getElementById('f-phone').value.trim();
    const type     = document.querySelector('input[name="type"]:checked').value;
    const delivery = document.getElementById('f-delivery').value;
    const date     = document.getElementById('f-date').value;

    if (!client)   { alert('Ju lutem shkruani emrin dhe mbiemrin.'); return; }
    if (!address)  { alert('Ju lutem shkruani lokacionin.'); return; }
    if (!delivery) { alert('Ju lutem zgjidhni datën e dërgimit.'); return; }
    if (!date)     { alert('Ju lutem zgjidhni datën e kthimit.'); return; }

    const paymentData = {
      monthlyPayment: Number(document.getElementById('f-monthly').value) || 0,
      paymentMethod:  document.getElementById('f-payment').value,
      currentDebt:    Number(document.getElementById('f-debt').value) || 0,
      dailyDebt:      Number(document.getElementById('f-daily-debt').value) || 0,
    };
    const wcData = {};
    if (type === 'WC') {
      const freq = document.querySelector('input[name="cleanFreq"]:checked')?.value || 'weekly';
      wcData.cleaningFrequency = freq;
      wcData.cleaningCustomDays = freq === 'custom' ? (Number(document.getElementById('f-custom-days').value) || 7) : 0;
      wcData.cleaningDays = (freq === 'weekly' || freq === 'biweekly')
        ? Array.from(document.querySelectorAll('input[name="cleanDay"]:checked')).map(cb => Number(cb.value))
        : [];
      wcData.cleaningDaysOfMonth = freq === 'monthly'
        ? Array.from(document.querySelectorAll('input[name="cleanDayOfMonth"]:checked')).map(cb => Number(cb.value))
        : [];
    }

    const newComment = document.getElementById('f-comment').value.trim();

    const orders = loadOrders();
    let savedOrder;

    if (editingId) {
      const o = orders.find(x => x.id === editingId);
      if (o) {
        Object.assign(o, { client, address, phone, type, deliveryDate: delivery, returnDate: date, ...paymentData, ...wcData });
        if (newComment) {
          if (!Array.isArray(o.comments)) o.comments = [];
          o.comments.push({ id: crypto.randomUUID(), text: newComment, createdAt: new Date().toISOString() });
        }
        savedOrder = o;
      }
    } else {
      const comments = [];
      if (newComment) {
        comments.push({ id: crypto.randomUUID(), text: newComment, createdAt: new Date().toISOString() });
      }
      savedOrder = {
        id: crypto.randomUUID(),
        client, address, phone, type,
        deliveryDate: delivery,
        returnDate:   date,
        returned:     false,
        createdAt:    new Date().toISOString(),
        comments,
        ...paymentData,
        ...wcData
      };
      orders.push(savedOrder);
    }

    saveOrders(orders);
    closeModal();
    render();
    if (savedOrder) scheduleCleaningNotifs(savedOrder);
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  document.getElementById('btn-add').addEventListener('click', () => openModal(null));
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('btn-save').addEventListener('click', saveOrder);

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  document.querySelectorAll('input[name="type"]').forEach(r => {
    r.addEventListener('change', syncWcSection);
  });

  document.querySelectorAll('input[name="cleanFreq"]').forEach(r => {
    r.addEventListener('change', syncCustomDays);
  });

  // Re-render calendar when delivery/return dates change
  ['f-delivery', 'f-date'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      if (!document.getElementById('month-day-picker-wrap').classList.contains('hidden')) {
        renderMonthCalendar();
      }
    });
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) saveOrder();
  });

  // ── Auth ─────────────────────────────────────────────────────────────────
  const AUTH_USER = 'manager';
  const AUTH_SALT = '82d073f9cfc08ad9196fb6670bfeed3a1144e5cc0f0040386f11f8a5be46af84';
  const AUTH_HASH = 'b5325af467343b20811c6260df9cdeb8f347b3856bfb900374ecf440d96f03ac'; // PBKDF2-SHA256, 200k rounds

  function hexToBytes(hex) {
    const b = new Uint8Array(hex.length / 2);
    for (let i = 0; i < b.length; i++) b[i] = parseInt(hex.substr(i * 2, 2), 16);
    return b;
  }

  async function pbkdf2Hash(password) {
    const key = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']
    );
    const bits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt: hexToBytes(AUTH_SALT), iterations: 200000, hash: 'SHA-256' },
      key, 256
    );
    return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function isLoggedIn() {
    return localStorage.getItem('authed') === '1' || sessionStorage.getItem('authed') === '1';
  }

  function showApp() {
    document.getElementById('login-screen').classList.add('hidden');
  }

  function showLogin() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('l-user').value = '';
    document.getElementById('l-pass').value = '';
    document.getElementById('login-error').textContent = '';
  }

  async function doLogin() {
    const user = document.getElementById('l-user').value.trim();
    const pass = document.getElementById('l-pass').value;
    const err  = document.getElementById('login-error');
    const btn  = document.getElementById('btn-login');

    if (!user || !pass) { err.textContent = 'Plotëso të gjitha fushat.'; return; }

    btn.disabled = true;
    btn.textContent = 'Duke u verifikuar…';

    const hash = await pbkdf2Hash(pass);
    btn.disabled = false;
    btn.textContent = 'Hyr →';

    if (user.toLowerCase() === AUTH_USER.toLowerCase() && hash === AUTH_HASH) {
      const remember = document.getElementById('l-remember').checked;
      if (remember) localStorage.setItem('authed', '1');
      else          sessionStorage.setItem('authed', '1');
      showApp();
      render();
      requestNotifPermission();
    } else {
      err.textContent = 'Emri ose fjalëkalimi është i gabuar.';
      document.getElementById('l-pass').value = '';
      document.getElementById('l-pass').focus();
    }
  }

  function doLogout() {
    localStorage.removeItem('authed');
    sessionStorage.removeItem('authed');
    showLogin();
  }

  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('btn-logout').addEventListener('click', doLogout);
  document.getElementById('l-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('l-user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('l-pass').focus();
  });

  // ── Init ─────────────────────────────────────────────────────────────────
  if (isLoggedIn()) {
    showApp();
    render();
    requestNotifPermission().then(() => rescheduleAllNotifs());
  }
</script>
